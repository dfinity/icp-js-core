name: NPM Audit

on:
  # Catch vulnerabilities introduced by a PR, right where the author can fix them.
  # Scoped to dependency changes so code-only PRs are never flagged for unrelated,
  # newly-published advisories (which are the weekly sweep's job, not a PR's).
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - '**/package.json'
      - 'pnpm-lock.yaml'
  # Weekly sweep: catches advisories published against already-installed deps and
  # auto-opens a fix PR, keeping the tree clean independently of PR activity.
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 09:00 UTC
  # Manual trigger, e.g. to remediate on demand after a fresh advisory.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PNPM
        uses: dfinity/ci-tools/actions/setup-pnpm@afeee4fbdc0683a88ec5a74ed7f59a2ce0e833ad # main

      - name: Run pnpm audit
        id: audit
        run: |
          if pnpm audit; then
            echo "No vulnerabilities found."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # On pull requests, keep the original behaviour: just fail the check.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::error::pnpm audit found vulnerabilities."
            exit 1
          fi

          # On scheduled / manual runs, attempt to auto-remediate and open a PR.
          echo "Vulnerabilities found — applying 'pnpm audit --fix'..."
          pnpm audit --fix || true
          pnpm install --no-frozen-lockfile

          if git diff --quiet; then
            echo "::warning::pnpm audit reported vulnerabilities, but 'pnpm audit --fix' produced no changes. Manual intervention is required."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "'pnpm audit --fix' updated dependencies; a pull request will be opened."
          echo "needs_update=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App Token
        if: steps.audit.outputs.needs_update == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: generate_token
        with:
          app-id: ${{ vars.PR_AUTOMATION_BOT_PUBLIC_APP_ID }}
          private-key: ${{ secrets.PR_AUTOMATION_BOT_PUBLIC_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.audit.outputs.needs_update == 'true'
        uses: dfinity/ci-tools/actions/create-pr@afeee4fbdc0683a88ec5a74ed7f59a2ce0e833ad # main
        with:
          token: ${{ steps.generate_token.outputs.token }}
          branch_name: 'chore/npm-audit-fix'
          pull_request_title: 'chore(deps): fix npm audit vulnerabilities'
          pull_request_body: |
            Automated dependency updates generated by `pnpm audit --fix`, opened by the
            [NPM Audit](https://github.com/dfinity/icp-js-core/actions/workflows/npm-audit.yml) workflow.

            Please review the dependency changes and confirm CI passes before merging.
          commit_message: 'chore(deps): fix npm audit vulnerabilities'
